kind = "web"
previewPath = "/"
title = "Sumo Guard"
version = "1.0.0"
id = "artifacts/sumo-guard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18761

[services.development]
run = "pnpm --filter @workspace/sumo-guard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/sumo-guard", "run", "build" ]
publicDir = "artifacts/sumo-guard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18761"
BASE_PATH = "/"
