openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Sumo Guard Health Analysis API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication
  - name: sleep
    description: Sleep tracking
  - name: habits
    description: Daily habit tracking
  - name: predictions
    description: Disease risk predictions
  - name: profile
    description: User profile
  - name: statistics
    description: Statistics
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: Registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Logged in
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/onboarding:
    post:
      operationId: saveOnboarding
      tags: [auth]
      summary: Save lifestyle onboarding data
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OnboardingRequest"
      responses:
        "200":
          description: Onboarding saved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthUser"

  /sleep:
    get:
      operationId: getSleepLogs
      tags: [sleep]
      summary: Get sleep logs
      parameters:
        - name: from
          in: query
          schema:
            type: string
        - name: to
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of sleep logs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SleepLog"
    post:
      operationId: createSleepLog
      tags: [sleep]
      summary: Create a sleep log
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSleepLog"
      responses:
        "201":
          description: Sleep log created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SleepLog"

  /sleep/{id}:
    delete:
      operationId: deleteSleepLog
      tags: [sleep]
      summary: Delete a sleep log
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /habits:
    get:
      operationId: getHabitLogs
      tags: [habits]
      summary: Get habit logs
      parameters:
        - name: from
          in: query
          schema:
            type: string
        - name: to
          in: query
          schema:
            type: string
      responses:
        "200":
          description: List of habit logs
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/HabitLog"
    post:
      operationId: createHabitLog
      tags: [habits]
      summary: Create a habit log
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateHabitLog"
      responses:
        "201":
          description: Habit log created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HabitLog"

  /habits/{id}:
    delete:
      operationId: deleteHabitLog
      tags: [habits]
      summary: Delete a habit log
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /predictions:
    get:
      operationId: getPredictions
      tags: [predictions]
      summary: Get disease risk predictions
      responses:
        "200":
          description: Disease risk predictions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PredictionsResult"

  /profile:
    get:
      operationId: getProfile
      tags: [profile]
      summary: Get user profile
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"
    put:
      operationId: updateProfile
      tags: [profile]
      summary: Update user profile
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateUserProfile"
      responses:
        "200":
          description: Updated profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfile"

  /dashboard:
    get:
      operationId: getDashboard
      tags: [predictions]
      summary: Get dashboard summary
      parameters:
        - name: date
          in: query
          schema:
            type: string
          description: Filter by specific date (YYYY-MM-DD)
      responses:
        "200":
          description: Dashboard summary data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardSummary"

  /statistics:
    get:
      operationId: getStatistics
      tags: [statistics]
      summary: Get statistics for a period
      parameters:
        - name: period
          in: query
          schema:
            type: string
            enum: [day, week, month, year]
          description: Period for statistics
        - name: date
          in: query
          schema:
            type: string
          description: Reference date (YYYY-MM-DD)
      responses:
        "200":
          description: Statistics data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/StatisticsResult"

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required:
        - success
        - message

    RegisterRequest:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
        password:
          type: string
      required:
        - name
        - email
        - password

    LoginRequest:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
      required:
        - email
        - password

    AuthUser:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        lifestyle:
          type: object
          additionalProperties: true
        onboardingDone:
          type: boolean
        createdAt:
          type: string
      required:
        - id
        - name
        - email
        - lifestyle
        - onboardingDone
        - createdAt

    AuthResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/AuthUser"
      required:
        - token
        - user

    OnboardingRequest:
      type: object
      properties:
        isSmoker:
          type: boolean
        isDrinker:
          type: boolean
        isAlcoholic:
          type: boolean
        hasChronicCondition:
          type: boolean
        chronicConditions:
          type: array
          items:
            type: string
        activityLevel:
          type: string
          enum: [sedentary, light, moderate, active, very_active]
        dietType:
          type: string
          enum: [standard, vegetarian, vegan, keto, paleo, other]
      required:
        - isSmoker
        - isDrinker
        - isAlcoholic
        - hasChronicCondition
        - chronicConditions
        - activityLevel
        - dietType

    SleepLog:
      type: object
      properties:
        id:
          type: integer
        bedtime:
          type: string
        wakeTime:
          type: string
        durationHours:
          type: number
        quality:
          type: string
          enum: [poor, fair, good, excellent]
        notes:
          type: string
          nullable: true
        date:
          type: string
        createdAt:
          type: string
      required:
        - id
        - bedtime
        - wakeTime
        - durationHours
        - quality
        - date
        - createdAt

    CreateSleepLog:
      type: object
      properties:
        bedtime:
          type: string
        wakeTime:
          type: string
        quality:
          type: string
          enum: [poor, fair, good, excellent]
        notes:
          type: string
          nullable: true
        date:
          type: string
      required:
        - bedtime
        - wakeTime
        - quality
        - date

    HabitLog:
      type: object
      properties:
        id:
          type: integer
        date:
          type: string
        exerciseMinutes:
          type: integer
        waterGlasses:
          type: integer
        fruitVeggieServings:
          type: integer
        screenTimeHours:
          type: number
        stressLevel:
          type: integer
        smokingCigarettes:
          type: integer
        alcoholDrinks:
          type: integer
        meditationMinutes:
          type: integer
        notes:
          type: string
          nullable: true
        createdAt:
          type: string
      required:
        - id
        - date
        - exerciseMinutes
        - waterGlasses
        - fruitVeggieServings
        - screenTimeHours
        - stressLevel
        - smokingCigarettes
        - alcoholDrinks
        - meditationMinutes
        - createdAt

    CreateHabitLog:
      type: object
      properties:
        date:
          type: string
        exerciseMinutes:
          type: integer
        waterGlasses:
          type: integer
        fruitVeggieServings:
          type: integer
        screenTimeHours:
          type: number
        stressLevel:
          type: integer
        smokingCigarettes:
          type: integer
        alcoholDrinks:
          type: integer
        meditationMinutes:
          type: integer
        notes:
          type: string
          nullable: true
      required:
        - date
        - exerciseMinutes
        - waterGlasses
        - fruitVeggieServings
        - screenTimeHours
        - stressLevel
        - smokingCigarettes
        - alcoholDrinks
        - meditationMinutes

    DiseaseRisk:
      type: object
      properties:
        diseaseName:
          type: string
        riskLevel:
          type: string
          enum: [low, moderate, high, critical]
        riskScore:
          type: number
        predictedTimeframe:
          type: string
        contributingFactors:
          type: array
          items:
            type: string
        recommendations:
          type: array
          items:
            type: string
      required:
        - diseaseName
        - riskLevel
        - riskScore
        - predictedTimeframe
        - contributingFactors
        - recommendations

    PredictionsResult:
      type: object
      properties:
        overallHealthScore:
          type: integer
        riskAssessmentDate:
          type: string
        diseases:
          type: array
          items:
            $ref: "#/components/schemas/DiseaseRisk"
        summary:
          type: string
        dataInsufficient:
          type: boolean
      required:
        - overallHealthScore
        - riskAssessmentDate
        - diseases
        - summary
        - dataInsufficient

    DashboardSummary:
      type: object
      properties:
        healthScore:
          type: integer
        avgSleepHours:
          type: number
        avgExerciseMinutes:
          type: number
        avgStressLevel:
          type: number
        avgWaterGlasses:
          type: number
        totalSleepLogs:
          type: integer
        totalHabitLogs:
          type: integer
        topRisks:
          type: array
          items:
            $ref: "#/components/schemas/DiseaseRisk"
        sleepTrend:
          type: array
          items:
            $ref: "#/components/schemas/SleepTrendPoint"
        recentLogs:
          type: array
          items:
            $ref: "#/components/schemas/HabitLog"
        selectedDate:
          type: string
          nullable: true
        selectedDateSleep:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/SleepLog"
        selectedDateHabit:
          nullable: true
          allOf:
            - $ref: "#/components/schemas/HabitLog"
      required:
        - healthScore
        - avgSleepHours
        - avgExerciseMinutes
        - avgStressLevel
        - avgWaterGlasses
        - totalSleepLogs
        - totalHabitLogs
        - topRisks
        - sleepTrend
        - recentLogs

    SleepTrendPoint:
      type: object
      properties:
        date:
          type: string
        hours:
          type: number
        quality:
          type: string
      required:
        - date
        - hours
        - quality

    StatisticsResult:
      type: object
      properties:
        period:
          type: string
        sleepData:
          type: array
          items:
            $ref: "#/components/schemas/SleepStatPoint"
        habitData:
          type: array
          items:
            $ref: "#/components/schemas/HabitStatPoint"
        averages:
          $ref: "#/components/schemas/StatAverages"
        monthlyReview:
          type: array
          items:
            $ref: "#/components/schemas/MonthlyReviewPoint"
      required:
        - period
        - sleepData
        - habitData
        - averages
        - monthlyReview

    SleepStatPoint:
      type: object
      properties:
        label:
          type: string
        date:
          type: string
        hours:
          type: number
        quality:
          type: string
        bedtime:
          type: string
        wakeTime:
          type: string
      required:
        - label
        - date
        - hours
        - quality
        - bedtime
        - wakeTime

    HabitStatPoint:
      type: object
      properties:
        label:
          type: string
        date:
          type: string
        exerciseMinutes:
          type: integer
        waterGlasses:
          type: integer
        stressLevel:
          type: integer
        smokingCigarettes:
          type: integer
        alcoholDrinks:
          type: integer
        meditationMinutes:
          type: integer
      required:
        - label
        - date
        - exerciseMinutes
        - waterGlasses
        - stressLevel
        - smokingCigarettes
        - alcoholDrinks
        - meditationMinutes

    StatAverages:
      type: object
      properties:
        avgSleepHours:
          type: number
        avgExerciseMinutes:
          type: number
        avgStressLevel:
          type: number
        avgWaterGlasses:
          type: number
        avgSmoking:
          type: number
        avgAlcohol:
          type: number
        sleepQualityDistribution:
          type: object
          properties:
            poor:
              type: integer
            fair:
              type: integer
            good:
              type: integer
            excellent:
              type: integer
          required: [poor, fair, good, excellent]
      required:
        - avgSleepHours
        - avgExerciseMinutes
        - avgStressLevel
        - avgWaterGlasses
        - avgSmoking
        - avgAlcohol
        - sleepQualityDistribution

    MonthlyReviewPoint:
      type: object
      properties:
        week:
          type: string
        avgSleep:
          type: number
        avgStress:
          type: number
        avgExercise:
          type: number
      required:
        - week
        - avgSleep
        - avgStress
        - avgExercise

    UserProfile:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        age:
          type: integer
        gender:
          type: string
          enum: [male, female, other]
        weight:
          type: number
        height:
          type: number
        existingConditions:
          type: array
          items:
            type: string
        familyHistory:
          type: array
          items:
            type: string
        createdAt:
          type: string
      required:
        - id
        - name
        - age
        - gender
        - weight
        - height
        - existingConditions
        - familyHistory
        - createdAt

    UpdateUserProfile:
      type: object
      properties:
        name:
          type: string
        age:
          type: integer
        gender:
          type: string
          enum: [male, female, other]
        weight:
          type: number
        height:
          type: number
        existingConditions:
          type: array
          items:
            type: string
        familyHistory:
          type: array
          items:
            type: string
      required:
        - name
        - age
        - gender
        - weight
        - height
        - existingConditions
        - familyHistory
